# 店舗名の表記揺れ辞書
# 公式サイト掲載名(キー)→ FAQ で使われる可能性のある別名(値の配列)
#
# キーは公式サイトに掲載されている表記とそろえてください。
# 自動生成される変形(小文字化、THE/ザ プレフィックス除去、スペース除去)は
# scripts/monitor.py 側で対応するため、ここには「全く異なる表記」だけを書きます。
#
